[bot]
# Скорость печати в символах в секунду (±20% случайность)
chars_per_second = 15
# Максимум сообщений в истории диалога на пользователя (ограничен context window LLM)
max_history = 40

[models]
# Модели OpenRouter в порядке приоритета. Если первая недоступна — переходим к следующей.
# Актуальный список бесплатных моделей: https://openrouter.ai/models?supported_parameters=free
fallback = [
    "nvidia/nemotron-3-ultra-550b-a55b:free",
    "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free",
    "tencent/hy3:free",
]